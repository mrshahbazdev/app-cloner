name: titan_clone
description: "Android App Cloning & Virtualization Platform — run multiple isolated instances of any Android app on a single device."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  shared_preferences: ^2.3.4
  flutter_svg: ^2.0.17
  intl: ^0.19.0
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  drift_dev: ^2.22.1
  pigeon: ^22.7.4

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
